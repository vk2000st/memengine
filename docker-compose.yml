services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: memengine
      POSTGRES_PASSWORD: memengine
      POSTGRES_DB: memengine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memengine"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  worker:
    build: .
    command: python -m arq app.worker.WorkerSettings
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://memengine:memengine@postgres:5432/memengine
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379
      LITELLM_MODEL: openai/gpt-4o-mini
      ENCRYPTION_KEY: acZL8VjT4S5E15xgeVN5Qo6slWkwfxt1L4LKxeIPPrA=
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./prompts:/app/prompts

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://memengine:memengine@postgres:5432/memengine
      QDRANT_URL: http://qdrant:6333
      LITELLM_MODEL: openai/gpt-4o-mini
      ENCRYPTION_KEY: acZL8VjT4S5E15xgeVN5Qo6slWkwfxt1L4LKxeIPPrA=
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./prompts:/app/prompts

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
